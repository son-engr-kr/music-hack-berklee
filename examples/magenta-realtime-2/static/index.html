<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Magenta RT 2 — Live Instruments</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: #0d1117; color: #e6edf3; height: 100vh; display: flex; flex-direction: column;
  }
  header {
    padding: 1rem 1.5rem; border-bottom: 1px solid #30363d;
    display: flex; align-items: center; gap: 1rem; flex-shrink: 0;
  }
  header h1 { font-size: 1.1rem; font-weight: 600; }
  .status { font-size: .8rem; color: #8b949e; margin-left: auto; }
  .status.online { color: #3fb950; }
  .status.offline { color: #f85149; }

  .tabs {
    display: flex; border-bottom: 2px solid #30363d; padding: 0 1rem; flex-shrink: 0;
  }
  .tab {
    padding: .6rem 1rem; cursor: pointer; border: none; background: none;
    font-size: .85rem; color: #8b949e; border-bottom: 2px solid transparent;
    margin-bottom: -2px; transition: .15s;
  }
  .tab:hover { color: #e6edf3; }
  .tab.active { color: #58a6ff; border-bottom-color: #58a6ff; font-weight: 600; }

  .panels { flex: 1; overflow-y: auto; padding: 1.5rem; }
  .panel { display: none; }
  .panel.active { display: block; }

  .controls { display: flex; flex-direction: column; gap: 1rem; max-width: 600px; }
  label { font-size: .85rem; color: #8b949e; display: block; margin-bottom: .3rem; }
  input, select, button {
    font-family: inherit; font-size: .9rem;
    padding: .5rem .75rem; border-radius: 6px; border: 1px solid #30363d;
    background: #161b22; color: #e6edf3; width: 100%; outline: none;
  }
  input:focus, select:focus { border-color: #58a6ff; }
  input[type="range"] { padding: 0; border: none; background: none; }
  button {
    background: #238636; border-color: #2ea043; cursor: pointer;
    font-weight: 600; transition: .15s;
  }
  button:hover { background: #2ea043; }
  button:active { background: #1a7b30; }
  button.danger { background: #da3633; border-color: #f85149; }
  button.danger:hover { background: #f85149; }
  button:disabled { opacity: .5; cursor: not-allowed; }
  .row { display: flex; gap: .75rem; }
  .row > * { flex: 1; }
  .visualizer {
    width: 100%; height: 120px; background: #161b22; border: 1px solid #30363d;
    border-radius: 8px; display: flex; align-items: center; justify-content: center;
    font-size: .85rem; color: #484f58; overflow: hidden; position: relative;
  }
  .visualizer canvas { width: 100%; height: 100%; }
  .piano {
    display: flex; height: 100px; overflow-x: auto; gap: 1px;
    background: #0d1117; border: 1px solid #30363d; border-radius: 6px; padding: 2px;
  }
  .piano-key {
    flex: 1; min-width: 16px; cursor: pointer; border-radius: 2px;
    background: #e6edf3; transition: .1s; position: relative;
  }
  .piano-key.black {
    background: #1a1a1a; margin-left: -8px; margin-right: -8px; z-index: 1;
    height: 60%; border-radius: 0 0 3px 3px; min-width: 10px;
  }
  .piano-key.active { background: #58a6ff !important; }
  .piano-key.black.active { background: #f778ba !important; }
  .gesture-pad {
    width: 100%; height: 250px; background: #161b22; border: 1px solid #30363d;
    border-radius: 8px; position: relative; cursor: crosshair; overflow: hidden;
  }
  .gesture-pad .dot {
    width: 40px; height: 40px; border-radius: 50%; background: #58a6ff;
    position: absolute; transform: translate(-50%, -50%);
    box-shadow: 0 0 20px rgba(88,166,255,.5); transition: .05s;
  }
  .gesture-pad .grid-line {
    stroke: #21262d; stroke-width: 1;
  }
  .layer-list { display: flex; flex-direction: column; gap: .5rem; }
  .layer-item {
    background: #161b22; border: 1px solid #30363d; border-radius: 6px;
    padding: .75rem; display: flex; align-items: center; gap: .75rem;
  }
  .layer-item .tag {
    font-size: .75rem; padding: .2em .5em; border-radius: 4px;
    background: #1a325f; color: #58a6ff; font-weight: 600;
  }
  .layer-item .rm { cursor: pointer; color: #f85149; font-size: 1.1rem; margin-left: auto; }
  .log {
    font-size: .8rem; color: #8b949e; font-family: monospace;
    background: #0d1117; border: 1px solid #30363d; border-radius: 6px;
    padding: .75rem; height: 120px; overflow-y: auto; white-space: pre-wrap;
  }
</style>
</head>
<body>

<header>
  <h1>🎹 Magenta RT 2</h1>
  <span class="status offline" id="status">Disconnected</span>
</header>

<div class="tabs" role="tablist">
  <button class="tab active" data-tab="synth">Synth</button>
  <button class="tab" data-tab="jam">Jam</button>
  <button class="tab" data-tab="gesture">Gesture</button>
  <button class="tab" data-tab="looper">Looper</button>
</div>

<div class="panels">

<!-- ===== Synth ===== -->
<div class="panel active" id="panel-synth">
  <div class="controls">
    <label>Timbre prompt</label>
    <input type="text" id="synth-prompt" value="warm analog pad">

    <label>Pitch <span id="synth-pitch-label">60 (C4)</span></label>
    <input type="range" id="synth-pitch" min="24" max="96" value="60">

    <label>Velocity <span id="synth-vel-label">100</span></label>
    <input type="range" id="synth-vel" min="20" max="127" value="100">

    <div class="row">
      <button id="synth-start">▶ Play</button>
      <button id="synth-stop" class="danger" disabled>■ Stop</button>
    </div>

    <div class="visualizer"><canvas id="synth-viz"></canvas></div>
    <div class="log" id="synth-log">Ready.</div>
  </div>
</div>

<!-- ===== Jam ===== -->
<div class="panel" id="panel-jam">
  <div class="controls">
    <label>Style prompt</label>
    <input type="text" id="jam-prompt" value="jazz quartet">

    <label>Piano (click keys to play)</label>
    <div class="piano" id="jam-piano"></div>

    <div class="row">
      <button id="jam-start">▶ Start Jam</button>
      <button id="jam-stop" class="danger" disabled>■ Stop</button>
    </div>

    <div class="visualizer"><canvas id="jam-viz"></canvas></div>
    <div class="log" id="jam-log">Ready.</div>
  </div>
</div>

<!-- ===== Gesture ===== -->
<div class="panel" id="panel-gesture">
  <div class="controls">
    <label>Style prompt</label>
    <input type="text" id="gesture-prompt" value="synthwave lead">

    <label>Touchpad — move cursor to play</label>
    <div class="gesture-pad" id="gesture-pad">
      <svg width="100%" height="100%" style="position:absolute;top:0;left:0;pointer-events:none;">
        <line class="grid-line" x1="25%" y1="0" x2="25%" y2="100%"/>
        <line class="grid-line" x1="50%" y1="0" x2="50%" y2="100%"/>
        <line class="grid-line" x1="75%" y1="0" x2="75%" y2="100%"/>
        <line class="grid-line" x1="0" y1="25%" x2="100%" y2="25%"/>
        <line class="grid-line" x1="0" y1="50%" x2="100%" y2="50%"/>
        <line class="grid-line" x1="0" y1="75%" x2="100%" y2="75%"/>
      </svg>
      <div class="dot" id="gesture-dot" style="left:50%;top:50%;"></div>
    </div>

    <div class="row">
      <button id="gesture-start">▶ Start</button>
      <button id="gesture-stop" class="danger" disabled>■ Stop</button>
    </div>

    <div class="visualizer"><canvas id="gesture-viz"></canvas></div>
    <div class="log" id="gesture-log">Ready.</div>
  </div>
</div>

<!-- ===== Looper ===== -->
<div class="panel" id="panel-looper">
  <div class="controls">
    <label>Base style</label>
    <input type="text" id="looper-prompt" value="lofi hip hop">

    <label>BPM</label>
    <input type="number" id="looper-bpm" value="90" min="40" max="200">

    <div class="row">
      <button id="looper-add-layer">+ Add Layer</button>
      <button id="looper-mix">🔀 Mix All</button>
    </div>

    <div class="layer-list" id="looper-layers"></div>

    <div class="visualizer"><canvas id="looper-viz"></canvas></div>
    <div class="log" id="looper-log">Ready.</div>
  </div>
</div>

</div>

<script>
// ---------- WebSocket ----------
let ws = null;
let audioCtx = null;
let isPlaying = false;
let activeMode = 'synth';
let activeNotes = new Set();

function getAudioCtx() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return audioCtx;
}

function connect() {
  ws = new WebSocket(`ws://${location.host}/ws`);
  const status = document.getElementById('status');
  ws.onopen = () => { status.textContent = 'Connected'; status.className = 'status online'; };
  ws.onclose = () => { status.textContent = 'Disconnected'; status.className = 'status offline'; setTimeout(connect, 1000); };
  ws.onmessage = e => {
    const msg = JSON.parse(e.data);
    if (msg.type === 'audio') {
      playAudio(msg.data, msg.sample_rate);
      drawWaveform(msg.data, activeMode + '-viz');
    }
  };
}
connect();

function send(msg) {
  if (ws && ws.readyState === WebSocket.OPEN) ws.send(JSON.stringify(msg));
}

function playAudio(hex, sr) {
  const ctx = getAudioCtx();
  const buf = hexToFloat32(hex, sr);
  const src = ctx.createBufferSource();
  src.buffer = buf;
  src.connect(ctx.destination);
  src.start();
}

function hexToFloat32(hex, sr) {
  const bytes = new Uint8Array(hex.match(/.{1,2}/g).map(b => parseInt(b, 16)));
  const view = new DataView(bytes.buffer, bytes.byteOffset, bytes.byteLength);
  const totalInt16 = (bytes.length - 44) / 2;
  const numFrames = totalInt16 / 2;
  const ctx = getAudioCtx();
  const buf = ctx.createBuffer(2, numFrames, sr);
  for (let ch = 0; ch < 2; ch++) {
    const chData = buf.getChannelData(ch);
    for (let i = 0; i < numFrames; i++) {
      chData[i] = view.getInt16(44 + i * 4 + ch * 2, true) / 32768;
    }
  }
  return buf;
}

// ---------- Waveform visualizer ----------
function drawWaveform(hex, canvasId) {
  const canvas = document.getElementById(canvasId);
  if (!canvas) return;
  const ctx = canvas.getContext('2d');
  const w = canvas.width, h = canvas.height;
  const bytes = new Uint8Array(hex.match(/.{1,2}/g).map(b => parseInt(b, 16)));
  const dataLen = (bytes.length - 44) / 2;
  ctx.fillStyle = '#161b22';
  ctx.fillRect(0, 0, w, h);
  ctx.strokeStyle = '#58a6ff';
  ctx.lineWidth = 1;
  ctx.beginPath();
  const step = Math.max(1, Math.floor(dataLen / w));
  for (let x = 0; x < w; x++) {
    let sum = 0;
    for (let j = 0; j < step; j++) {
      const idx = (x * step + j) * 2 + 44;
      if (idx + 1 < bytes.length) sum += Math.abs((bytes[idx] | (bytes[idx + 1] << 8)));
    }
    const y = h / 2 - (sum / step / 32768) * (h / 2);
    x === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
  }
  ctx.stroke();
}

// ---------- Piano keyboard ----------
function buildPiano(container, mode) {
  const notes = ['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];
  const blackSet = new Set([1,3,6,8,10]);
  container.innerHTML = '';
  for (let oct = 2; oct <= 7; oct++) {
    for (let n = 0; n < 12; n++) {
      const key = document.createElement('div');
      const midi = oct * 12 + n;
      const isBlack = blackSet.has(n);
      key.className = 'piano-key' + (isBlack ? ' black' : '');
      key.dataset.midi = midi;
      key.title = notes[n] + oct;
      key.addEventListener('mousedown', () => {
        key.classList.add('active');
        activeNotes.add(midi);
        send({ mode, action: 'generate', prompt: getPrompt(mode), notes: [...activeNotes], frames: 25 });
      });
      key.addEventListener('mouseup', () => {
        key.classList.remove('active');
        activeNotes.delete(midi);
      });
      key.addEventListener('mouseleave', () => {
        key.classList.remove('active');
        activeNotes.delete(midi);
      });
      container.appendChild(key);
    }
  }
}

function getPrompt(mode) {
  return document.getElementById(`${mode}-prompt`).value;
}

// ---------- Tab switching ----------
document.querySelectorAll('.tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
    tab.classList.add('active');
    document.getElementById('panel-' + tab.dataset.tab).classList.add('active');
    activeMode = tab.dataset.tab;
  });
});

// ---------- Synth ----------
document.getElementById('synth-pitch').addEventListener('input', e => {
  document.getElementById('synth-pitch-label').textContent = `${e.target.value} (MIDI)`;
});
document.getElementById('synth-vel').addEventListener('input', e => {
  document.getElementById('synth-vel-label').textContent = e.target.value;
});

let synthInterval = null;
document.getElementById('synth-start').addEventListener('click', () => {
  if (synthInterval) return;
  document.getElementById('synth-start').disabled = true;
  document.getElementById('synth-stop').disabled = false;
  log('synth-log', 'Playing...');
  synthInterval = setInterval(() => {
    const pitch = parseInt(document.getElementById('synth-pitch').value);
    send({ mode: 'synth', action: 'generate', prompt: getPrompt('synth'), pitch, frames: 25 });
  }, 1000);
});
document.getElementById('synth-stop').addEventListener('click', () => {
  clearInterval(synthInterval);
  synthInterval = null;
  document.getElementById('synth-start').disabled = false;
  document.getElementById('synth-stop').disabled = true;
  log('synth-log', 'Stopped.');
});

// ---------- Jam ----------
buildPiano(document.getElementById('jam-piano'), 'jam');

let jamInterval = null;
document.getElementById('jam-start').addEventListener('click', () => {
  if (jamInterval) return;
  document.getElementById('jam-start').disabled = true;
  document.getElementById('jam-stop').disabled = false;
  log('jam-log', 'Jam session started. Click piano keys!');
  jamInterval = setInterval(() => {
    if (activeNotes.size > 0) {
      send({ mode: 'jam', action: 'generate', prompt: getPrompt('jam'), notes: [...activeNotes], frames: 25 });
    }
  }, 1000);
});
document.getElementById('jam-stop').addEventListener('click', () => {
  clearInterval(jamInterval);
  jamInterval = null;
  document.getElementById('jam-start').disabled = false;
  document.getElementById('jam-stop').disabled = true;
  log('jam-log', 'Jam session stopped.');
});

// ---------- Gesture ----------
const gesturePad = document.getElementById('gesture-pad');
const gestureDot = document.getElementById('gesture-dot');
let gestureActive = false;

gesturePad.addEventListener('mousemove', e => {
  if (!gestureActive) return;
  const rect = gesturePad.getBoundingClientRect();
  const x = (e.clientX - rect.left) / rect.width;
  const y = (e.clientY - rect.top) / rect.height;
  gestureDot.style.left = (x * 100) + '%';
  gestureDot.style.top = (y * 100) + '%';
  send({ mode: 'gesture', action: 'generate', prompt: getPrompt('gesture'), x, y, frames: 25 });
});

gesturePad.addEventListener('mouseenter', () => { gestureActive = true; });
gesturePad.addEventListener('mouseleave', () => { gestureActive = false; });

let gestureInterval = null;
document.getElementById('gesture-start').addEventListener('click', () => {
  if (gestureInterval) return;
  gestureActive = true;
  document.getElementById('gesture-start').disabled = true;
  document.getElementById('gesture-stop').disabled = false;
  log('gesture-log', 'Move cursor on the pad to play!');
});
document.getElementById('gesture-stop').addEventListener('click', () => {
  gestureActive = false;
  clearInterval(gestureInterval);
  gestureInterval = null;
  document.getElementById('gesture-start').disabled = false;
  document.getElementById('gesture-stop').disabled = true;
  log('gesture-log', 'Stopped.');
});

// ---------- Looper ----------
let layerCount = 0;

document.getElementById('looper-add-layer').addEventListener('click', () => {
  const container = document.getElementById('looper-layers');
  const idx = layerCount++;
  const item = document.createElement('div');
  item.className = 'layer-item';
  item.id = 'layer-' + idx;
  item.innerHTML = `
    <span class="tag">Layer ${idx + 1}</span>
    <input type="text" value="${getPrompt('looper')}" style="flex:1;font-size:.85rem;">
    <span class="rm" onclick="removeLayer(${idx})">✕</span>
  `;
  container.appendChild(item);

  send({ mode: 'looper', action: 'generate', prompt: getPrompt('looper'), notes: [60], frames: 100 });
  log('looper-log', `Layer ${idx + 1} added.`);
});

window.removeLayer = (idx) => {
  const el = document.getElementById('layer-' + idx);
  if (el) el.remove();
  log('looper-log', `Layer ${idx + 1} removed.`);
};

document.getElementById('looper-mix').addEventListener('click', () => {
  log('looper-log', 'Mixing all layers...');
});

// ---------- Helpers ----------
function log(id, msg) {
  const el = document.getElementById(id);
  if (!el) return;
  el.textContent += '\n' + new Date().toLocaleTimeString() + ' ' + msg;
  el.scrollTop = el.scrollHeight;
}

// Resize canvases
document.querySelectorAll('canvas').forEach(c => {
  c.width = c.clientWidth * 2;
  c.height = c.clientHeight * 2;
});
window.addEventListener('resize', () => {
  document.querySelectorAll('canvas').forEach(c => {
    c.width = c.clientWidth * 2;
    c.height = c.clientHeight * 2;
  });
});
</script>
</body>
</html>
